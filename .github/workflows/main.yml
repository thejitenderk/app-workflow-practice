name: Docker CI
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  NEXUS_URL: acrforall.azurecr.io

jobs:
  build:
    name: Docker Build CI
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      # - name: Configure insecure registry
      #   run: |
      #     sudo mkdir -p /etc/docker
      #     echo '{"insecure-registries": ["20.235.80.53:8082"]}' | sudo tee /etc/docker/daemon.json
      #     sudo systemctl restart docker
      #     sleep 5
    
      - name: Docker Login
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.NEXUS_URL }}
          username: ${{ secrets.ACR_USER }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Build and push Docker images
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.NEXUS_URL }}/react-app:${{ github.run_number }}
      


                
