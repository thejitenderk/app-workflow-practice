  deploy:
    runs-on: ubuntu-latest
    # needs: build
    name: Deploy - Release
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8
        with:
          # Artifact name
          name: React-App-23523068344
          github-token: ${{ GITHUB.TOKEN }}
          # Destination path
          path: ${{ runner.temp }}
          run-id: 23523068344
          
      - name: Copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.AZHOST }}
          username: ${{ secrets.AZUSERNAME }}
          password: ${{ secrets.AZPASSWORD }}
          port: ${{ secrets.AZPORT }}
          source: ${{ runner.temp }}/*
          target: /tmp/artifacts
          strip_components: 4
